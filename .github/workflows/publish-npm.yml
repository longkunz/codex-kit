name: Build and Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: npm-publish-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Test, build, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build --if-present

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Check whether version is already published
        id: package
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$PACKAGE_NAME@$PACKAGE_VERSION already exists on npm; publish skipped."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION will be published."
          fi

      - name: Publish package to npm
        if: steps.package.outputs.should_publish == 'true'
        run: npm publish --access public

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## npm package"
            echo ""
            echo "- Package: \`${{ steps.package.outputs.name }}\`"
            echo "- Version: \`${{ steps.package.outputs.version }}\`"
            echo "- Publish required: \`${{ steps.package.outputs.should_publish }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
